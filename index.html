<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Own The Shift — Frontline Coach</title>
    <meta name="description" content="Frontline Coach is an AI leadership-coaching app for newly promoted managers and shift leads. Get the exact words for a hard conversation, rehearse it before it happens, and document it after — built by an operator, not a corporate HR vendor." />
    <link rel="canonical" href="https://frontline-coach.com/" />

    <!-- Open Graph / Facebook, LinkedIn, iMessage, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://frontline-coach.com/" />
    <meta property="og:title" content="Frontline Coach — AI Leadership Coaching for Shift Leads & New Managers" />
    <meta property="og:description" content="Get the exact words for a hard conversation, rehearse it before it happens, and document it after — built by an operator, not a corporate HR vendor." />
    <meta property="og:image" content="https://frontline-coach.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Frontline Coach — AI Leadership Coaching for Shift Leads & New Managers" />
    <meta name="twitter:description" content="Get the exact words for a hard conversation, rehearse it before it happens, and document it after — built by an operator, not a corporate HR vendor." />
    <meta name="twitter:image" content="https://frontline-coach.com/og-image.png" />

    <!-- PWA: makes the app installable with a real icon on Android and iOS -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS 26 bug: "black-translucent" shorts the app window by the status-bar
         height and dumps the deficit as an unpaintable gap at the bottom.
         "black" gives a solid black status bar (invisible against our black UI)
         and a correctly sized window. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Frontline Coach" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      Own The Shift — Frontline Coach is an AI leadership-coaching app for newly promoted managers
      and shift leads. Get the exact words for a hard conversation, rehearse it before it happens,
      and document it after. Sign in or create a free account at frontline-coach.com to get started.
    </noscript>
    <!-- Netlify Forms detection — must exist in static HTML at build time -->
    <form name="tool-feedback" data-netlify="true" hidden>
      <input type="text" name="tool" />
      <input type="text" name="rating" />
      <input type="text" name="input" />
      <input type="text" name="timestamp" />
    </form>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Register the service worker so the app qualifies as installable -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
