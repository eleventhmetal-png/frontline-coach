<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Frontline Coach</title>
    <meta name="description" content="Know what to say. Lead the shift." />

    <!-- PWA: makes the app installable with a real icon on Android and iOS -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Frontline Coach" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Netlify Forms detection — must exist in static HTML at build time -->
    <form name="tool-feedback" data-netlify="true" hidden>
      <input type="text" name="tool" />
      <input type="text" name="rating" />
      <input type="text" name="input" />
      <input type="text" name="timestamp" />
    </form>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Register the service worker so the app qualifies as installable -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
